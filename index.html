<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CMS3‑FAST: VR Example</title>
  <meta name="description" content="Large DDD model" />

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.controls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-randomizer-components@3.0.2/dist/aframe-randomizer-components.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene
    renderer="physicallyCorrectLights: true;"
    vr-mode-ui="enabled: true"
  >
    <a-assets>
      <template id="avatar-template">
        <a-entity class="avatar">
          <a-sphere class="head" scale="0.45 0.5 0.4"></a-sphere>
          <a-entity class="face" position="0 0.05 0">
            <a-sphere class="eye" color="#efefef" position="0.16 0.1 -0.35" scale="0.12"></a-sphere>
            <a-sphere class="pupil" color="#000" position="0 0 -1" scale="0.2"></a-sphere>
            <a-sphere class="eye" color="#efefef" position="-0.16 0.1 -0.35" scale="0.12"></a-sphere>
            <a-sphere class="pupil" color="#000" position="0 0 -1" scale="0.2"></a-sphere>
          </a-entity>
        </a-entity>
      </template>
    </a-assets>

    <a-entity id="cameraRig" position="10 1.6 60" movement-controls="fly:true; speed:1;">
      <a-entity
        camera
        position="1 2 2"
        wasd-controls="acceleration:25;fly:true;verticalFlySpeed:0.1;"
        look-controls
      >
        <a-sphere class="head" visible="false" random-color></a-sphere>
      </a-entity>
    </a-entity>

    <a-entity
      gltf-model="assets/large_DDD_model.glb"
      position="10 0 10"
      rotation="90 0 0"
      scale="12 12 12"
    ></a-entity>
    
    <a-entity
      gltf-model="assets/dislocation100.glb"
      position="40 0 10"
      rotation="90 0 0"
      scale="12 12 12"
    ></a-entity>

    <a-assets>
        <img id="swampSky" src="assets/fantasy_swamp_360.jpg">
    </a-assets>

    <a-sky
        src="#swampSky"
        rotation="0 -90 0">
    </a-sky>
    
    <a-entity
        light="type:ambient;
               color:#b6d6a8;
               intensity:0.9">
    </a-entity>

    <!-- Bright ambient light -->
    <a-entity
        light="type:ambient;
               color:#ffffff;
               intensity:1.5">
    </a-entity>
    
    <!-- Sunlight -->
    <a-entity
        light="type:directional;
               color:#fff7d1;
               intensity:1.4"
        position="-10 20 10">
    </a-entity>
    
    <!-- Fill light -->
    <a-entity
        light="type:hemisphere;
               color:#dfffd4;
               groundColor:#6f7b5b;
               intensity:1.1">
    </a-entity>

    <!-- Water -->
    <a-circle
        radius="100"
        rotation="-90 0 0"
        color="#355b43">
    </a-circle>
    
    <!-- ================= FOREST ================= -->

    <!-- TREE 1 -->
    <a-entity position="-5 0 -5">
        <a-cylinder color="#5b3b24" radius="0.5" height="7" position="0 3.5 0"></a-cylinder>
        <a-sphere color="#4d7c3a" radius="2.5" position="0 7.5 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 2 -->
    <a-entity position="8 0 -8">
        <a-cylinder color="#5b3b24" radius="0.5" height="8" position="0 4 0"></a-cylinder>
        <a-sphere color="#4d7c3a" radius="2.7" position="0 8.5 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 3 -->
    <a-entity position="18 0 -2">
        <a-cylinder color="#5b3b24" radius="0.45" height="7" position="0 3.5 0"></a-cylinder>
        <a-sphere color="#547f3d" radius="2.3" position="0 7.2 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 4 -->
    <a-entity position="22 0 12">
        <a-cylinder color="#5b3b24" radius="0.6" height="8" position="0 4 0"></a-cylinder>
        <a-sphere color="#4b7335" radius="3" position="0 8.8 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 5 -->
    <a-entity position="10 0 20">
        <a-cylinder color="#5b3b24" radius="0.5" height="8" position="0 4 0"></a-cylinder>
        <a-sphere color="#50783a" radius="2.8" position="0 8.5 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 6 -->
    <a-entity position="-8 0 15">
        <a-cylinder color="#5b3b24" radius="0.5" height="7" position="0 3.5 0"></a-cylinder>
        <a-sphere color="#50783a" radius="2.6" position="0 7.5 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 7 -->
    <a-entity position="0 0 5">
        <a-cylinder color="#5b3b24" radius="0.5" height="7" position="0 3.5 0"></a-cylinder>
        <a-sphere color="#50783a" radius="2.6" position="0 7.5 0"></a-sphere>
    </a-entity>
    
    <!-- TREE 8 -->
    <a-entity position="15 0 8">
        <a-cylinder color="#5b3b24" radius="0.55" height="8" position="0 4 0"></a-cylinder>
        <a-sphere color="#4d7c3a" radius="2.8" position="0 8.5 0"></a-sphere>
    </a-entity>

    <a-sphere position="-18 1 -10" radius="1.3" color="#567a42"></a-sphere>
    <a-sphere position="14 1 -15" radius="1.0" color="#62884b"></a-sphere>
    <a-sphere position="-12 1 18" radius="1.2" color="#587c43"></a-sphere>
    <a-sphere position="22 1 10" radius="1.4" color="#54763d"></a-sphere>
    <a-sphere position="-28 1 8" radius="1.1" color="#5e8148"></a-sphere>
    
    <!-- Moss canopy -->
    <a-sphere
        position="8 6 -12"
        radius="2.2"
        color="#3d5d36">
    </a-sphere>
    
    <!-- Lily pad -->
    <a-cylinder
        position="3 0.02 -6"
        radius="0.6"
        height="0.02"
        color="#4f7f3d">
    </a-cylinder>

    <!-- Add basic VR controllers for hand input -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>
  </a-scene>

</body>
</html>
